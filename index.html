<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 150; // Cantidad de textos "I Love You" que forman el contorno
    const textAround = "i love youuu";

    // --- CAMBIA ESTO ---
    const personName = "diego"; // Pon aquí el nombre de la persona
    // -------------------

    // Ecuación paramétrica del corazón (para el contorno)
    function getHeartPoint(t) {
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x: x * 15, y: y * 15 }; 
    }

    class Particle {
        constructor(t) {
            this.t = t;
            this.pos = getHeartPoint(this.t);
            this.fontSize = Math.random() * 10 + 10;
            this.opacity = Math.random();
            this.speed = Math.random() * 0.02 + 0.005;
        }

        draw() {
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = "#ff4d6d"; // Color rosado/rojo del contorno
            ctx.font = `${this.fontSize}px Arial, sans-serif`;
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            ctx.fillText(textAround, centerX + this.pos.x, centerY + this.pos.y);
        }

        update() {
            this.opacity += this.speed;
            if (this.opacity > 1 || this.opacity < 0.2) {
                this.speed *= -1;
            }
        }
    }

    // Nueva función para dibujar el nombre en el centro
    function drawCenterName() {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        ctx.globalAlpha = 1; // Brillo total para el nombre central
        ctx.fillStyle = "white"; // Color del nombre central
        ctx.font = "bold 40px Arial, sans-serif"; // Tamaño y estilo de fuente
        ctx.textAlign = "center"; // Centrar horizontalmente respecto al punto dado
        ctx.textBaseline = "middle"; // Centrar verticalmente respecto al punto dado
        
        ctx.fillText(personName, centerX, centerY);
    }

    function init() {
        for (let i = 0; i < particleCount; i++) {
            const t = (i / particleCount) * Math.PI * 2;
            particles.push(new Particle(t));
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Dibujar el contorno del corazón
        particles.forEach(p => {
            p.update();
            p.draw();
        });

        // Dibujar el nombre en el centro después de las partículas
        drawCenterName();

        requestAnimationFrame(animate);
    }

    init();
    animate();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
